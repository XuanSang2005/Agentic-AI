# Chuẩn hóa 82 attribute token thật → concept. Phủ đủ 82/82 token (verify bằng make verify-data).
# Đây cũng là WHITELIST cho LLM planner sau này.
#
# Mỗi concept:
#   tokens : token CÓ THẬT trong cột POI_Dataset.attributes (không chế mới) — dùng để
#            MATCH phía POI: POI khớp concept nếu có BẤT KỲ token thành viên nào.
#   surface: cách diễn đạt phía QUERY kích hoạt concept (ngoài chính các token).
#            Matching trên text đã normalize_vi, word-boundary.
#
# ⚠ Bẫy normalize đã né (trùng chữ sau khi bỏ dấu):
#   "chợ"→"cho" (từ nối), "sách"→"sach" (sạch), "phở"→"pho" (phố) → chỉ dùng surface đa từ.
# Nhóm synonym-noise trong data đã gộp theo CLAUDE.md:
#   gia đình + trẻ em (1 concept), lãng mạn + hẹn hò + cặp đôi, giá rẻ/hợp lý/vừa phải,
#   wifi/wifi mạnh, ngoài trời/sân vườn.

