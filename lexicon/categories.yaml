# Category chuẩn trong data + synonym (surface form phía query) để map query → category.
# Matching chạy trên text đã normalize_vi (bỏ dấu) — file này giữ dấu cho dễ đọc,
# rules.py tự normalize khi load. Một surface có thể thuộc NHIỀU category (set semantics).
#
# ⚠ Bẫy normalize đã né:
#   - "chợ" → "cho" trùng từ "cho" (P019 "bún chả CHO khách du lịch") → không dùng bare "chợ".
#   - "phở" → "pho" trùng "phố" (phố đi bộ) → chỉ dùng "quán phở"/"phở bò".
#   - "ăn uống" KHÔNG map vào Nhà hàng: mall cũng có attr "ăn uống" (P021/P055 đáp án là mall).

quan_ca_phe:
  canonical: Quán cà phê
  synonyms: [cafe, cà phê, coffee, coffee shop, quán cafe, uống cafe, uống cà phê]

nha_hang:
